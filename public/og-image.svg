<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="dots" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="18" r="1.1" fill="rgb(215,215,215)" opacity="0.038"/>
    </pattern>
    <radialGradient id="glow" cx="28%" cy="58%" r="52%">
      <stop offset="0%" stop-color="#C57B2B" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#090909" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#090909"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Large faded SG watermark, right -->
  <text x="820" y="490"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="320" font-style="italic" font-weight="300"
    fill="#C57B2B" opacity="0.028">SG</text>

  <!-- Left copper vertical bar -->
  <rect x="64" y="64" width="2" height="502" fill="#C57B2B" opacity="0.55"/>

  <!-- SG monogram top -->
  <text x="86" y="112"
    font-family="'Courier New', Courier, monospace"
    font-size="14" font-weight="400"
    fill="#C57B2B" letter-spacing="5" opacity="0.9">SG</text>

  <!-- Thin rule under monogram -->
  <line x1="86" y1="124" x2="240" y2="124" stroke="#C57B2B" stroke-width="0.5" opacity="0.28"/>

  <!-- Main name -->
  <text x="86" y="286"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="90" font-style="italic" font-weight="300"
    fill="#efefef" letter-spacing="-1">Shoryavardhaan</text>

  <text x="86" y="386"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="90" font-style="italic" font-weight="300"
    fill="#efefef" letter-spacing="-1">Gupta</text>

  <!-- Copper separator -->
  <line x1="86" y1="420" x2="740" y2="420" stroke="#C57B2B" stroke-width="1" opacity="0.35"/>

  <!-- Tagline -->
  <text x="86" y="455"
    font-family="'Courier New', Courier, monospace"
    font-size="18" font-weight="400"
    fill="#C57B2B" letter-spacing="2">Builder · Developer · Founder</text>

  <!-- Location -->
  <text x="86" y="484"
    font-family="'Courier New', Courier, monospace"
    font-size="14" font-weight="400"
    fill="#7a7a7a" letter-spacing="1.5">Kolkata, India · 16</text>

  <!-- URL bottom right -->
  <text x="1136" y="566"
    font-family="'Courier New', Courier, monospace"
    font-size="13" font-weight="400"
    fill="#383838" letter-spacing="0.5"
    text-anchor="end">shoryavardhaan.vercel.app</text>
</svg>
